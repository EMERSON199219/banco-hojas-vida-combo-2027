name: Deploy Firestore Rules

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-rules:
    name: Deploy Firestore rules to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@11

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only firestore:rules --project banco-de-hojas-de-vida-b3794 --token "$FIREBASE_TOKEN"
